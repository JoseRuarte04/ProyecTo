name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  # Valores públicos por diseño (viajan en el bundle del cliente).
  # Cualquier secreto real va en GitHub Secrets, nunca acá.
  VITE_SUPABASE_PROJECT_ID: pvuaqatdendcgumwktid
  VITE_SUPABASE_URL: https://pvuaqatdendcgumwktid.supabase.co
  VITE_SUPABASE_PUBLISHABLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB2dWFxYXRkZW5kY2d1bXdrdGlkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxODI1NDksImV4cCI6MjA5MDc1ODU0OX0.lXARzBHFr25LgypLiGivFC49FO4Yy6FdZiH4JMSl9lI

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      # Techo de warnings: la deuda actual son 260 (212 son no-explicit-any).
      # Si bajás warnings, bajá el número acá para que no vuelvan a subir.
      - name: Lint
        run: npx eslint . --max-warnings 260

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Tests
        run: npm test

      - name: Build
        run: npm run build
